<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>OB</text></svg>">
    
    <title>Ourbox v5.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .box-shadow { box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39); }
        .admin-glow { border: 1px solid rgba(59, 130, 246, 0.1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.05); }
        .p2p-glow { border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: 0 0 20px rgba(168, 85, 247, 0.1); }
        .ourbox-logo { height: 90px; width: auto; margin: 0 auto; display: block; }
        .progress-bar { transition: width 0.2s ease-out; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-sans text-gray-900 dark:text-gray-100 pb-20 transition-colors duration-300">

    <div class="max-w-3xl mx-auto py-12 px-4 relative">
        <div class="absolute top-4 right-4 flex items-center gap-3">
            <button onclick="location.reload()" class="p-2 rounded-full bg-white dark:bg-gray-800 text-gray-500 hover:text-blue-500 transition shadow-sm h-9 w-9 flex items-center justify-center border dark:border-gray-700">↻</button>
            <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 text-gray-800 dark:text-yellow-400 transition shadow-sm h-9 w-9 flex items-center justify-center">
                <span id="themeIcon">🌙</span>
            </button>
            <div class="bg-gray-800 dark:bg-gray-700 text-white text-[9px] font-bold px-2 py-1 rounded-md shadow-sm uppercase">v5.2 Pro</div>
        </div>

        <div class="text-center mb-8">
            <svg class="ourbox-logo mb-2" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
                <g class="stroke-gray-800 dark:stroke-gray-300" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M50 45 L22 55 L22 75 L50 85 L78 75 L78 55 Z"/><path d="M50 45 L50 65 M50 65 L22 55 M50 65 L78 55"/><path d="M22 55 L8 42 L36 32 M78 55 L92 42 L64 32"/><path d="M50 45 L36 32 M50 45 L64 32"/>
                </g>
                <g stroke="#3B82F6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M38 60 Q20 45 28 25 L24 28 M28 25 L32 28"/><path d="M45 60 Q40 40 43 18 L39 22 M43 18 L47 22"/><path d="M55 60 Q60 40 57 18 L53 22 M57 18 L61 22"/><path d="M62 60 Q80 45 72 25 L68 28 M72 25 L76 28"/>
                </g>
            </svg>
            <h1 class="text-4xl font-black text-gray-900 dark:text-white uppercase tracking-tighter">Ourbox</h1>
            <p class="text-blue-500 text-[10px] uppercase font-bold tracking-[0.2em]">Ultimate Hybrid Repository</p>
        </div>

        <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl p2p-glow mb-8 transition-colors">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="text-lg">⚡</span>
                    <h2 class="text-xs font-black text-purple-600 dark:text-purple-400 uppercase tracking-widest">Live Direct Stream</h2>
                </div>
                <div id="p2pStatus" class="text-[9px] font-bold px-2 py-1 bg-gray-100 dark:bg-gray-700 rounded text-gray-500 uppercase">Idle</div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-purple-50 dark:bg-purple-900/20 p-4 rounded-xl border border-purple-100 dark:border-purple-800/50">
                    <p class="text-[9px] font-bold text-purple-500 uppercase mb-2">Host a Stream</p>
                    <input type="file" id="p2pFile" class="w-full text-[10px] mb-3 file:mr-2 file:py-1 file:px-3 file:rounded-md file:border-0 file:bg-purple-600 file:text-white cursor-pointer dark:text-gray-300">
                    <button onclick="startHosting()" class="w-full bg-purple-600 text-white px-4 py-2 rounded-lg text-[10px] font-black hover:bg-purple-700 transition">GENERATE LIVE LINK</button>
                    <div id="hostCodeArea" class="hidden mt-3 text-center">
                        <p id="hostCodeDisplay" class="text-2xl font-black text-purple-600 dark:text-purple-400 tracking-widest"></p>
                    </div>
                </div>
                <div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-xl border border-gray-100 dark:border-gray-700">
                    <p class="text-[9px] font-bold text-gray-500 uppercase mb-2">Join a Stream</p>
                    <div class="flex gap-2">
                        <input type="text" id="joinCode" placeholder="Code" class="w-full px-3 py-2 bg-white dark:bg-gray-800 border dark:border-gray-600 rounded-lg text-xs font-bold dark:text-white">
                        <button onclick="joinStream()" class="bg-gray-800 dark:bg-gray-600 text-white px-4 py-2 rounded-lg text-[10px] font-black hover:bg-gray-700">CONNECT</button>
                    </div>
                </div>
            </div>
            <div id="streamProgressArea" class="hidden mt-5">
                <div class="w-full bg-purple-100 dark:bg-gray-700 rounded-full h-1.5 mb-1">
                    <div id="streamProgressBar" class="bg-purple-600 h-1.5 rounded-full progress-bar" style="width: 0%"></div>
                </div>
                <div class="flex justify-between items-center px-1">
                    <p id="streamText" class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest">Streaming...</p>
                    <p id="streamETA" class="text-[9px] font-bold text-purple-500 uppercase tracking-widest"></p>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 mb-8 admin-glow transition-colors">
            <div class="flex items-center gap-2 mb-5">
                <span class="text-lg">☁️</span>
                <h2 class="text-xs font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest">Standard Cloud Upload</h2>
            </div>
            <div class="flex flex-col gap-4">
                <input type="text" id="folderName" placeholder="Project / Folder" class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white text-sm">
                <div class="flex gap-3">
                    <input type="text" id="customFileName" placeholder="File Name" class="flex-1 px-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-blue-600 dark:text-blue-400 font-medium text-sm">
                    <input type="text" id="fileVersion" value="1.0" class="w-24 px-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-center font-bold dark:text-white text-sm">
                </div>
                <div class="border-2 border-dashed border-gray-200 dark:border-gray-600 rounded-xl p-4 hover:border-blue-400 transition-all">
                    <input type="file" id="fileItem" onchange="autoFillInfo()" class="w-full text-xs text-gray-500 dark:text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:font-bold file:bg-blue-600 file:text-white cursor-pointer" />
                </div>
                <div id="fileInfoBox" class="hidden bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-100 dark:border-blue-800/50 flex justify-between">
                    <div><p class="text-[9px] text-gray-400 uppercase font-bold">Total Chunks</p><p id="infoChunks" class="text-sm font-black dark:text-white">--</p></div>
                    <div class="text-right"><p class="text-[9px] text-gray-400 uppercase font-bold">Estimated Time</p><p id="infoTime" class="text-sm font-black dark:text-white">--</p></div>
                </div>
                <div id="statusArea" class="hidden mt-2">
                    <div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-1.5 mb-1">
                        <div id="statusProgress" class="bg-blue-600 h-1.5 rounded-full progress-bar" style="width: 0%"></div>
                    </div>
                    <div class="flex justify-between items-center px-1">
                        <p id="statusText" class="text-[9px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest">Processing...</p>
                        <p id="etaText" class="text-[9px] font-bold text-blue-500 uppercase tracking-widest"></p>
                    </div>
                </div>
                <button id="uploadBtn" onclick="uploadLargeFile()" class="w-full bg-blue-600 text-white px-8 py-3.5 rounded-xl text-xs tracking-widest font-black hover:bg-blue-700 transition box-shadow uppercase">Publish to Cloud</button>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden transition-colors">
            <div id="folderContainer" class="divide-y divide-gray-100 dark:divide-gray-700">
                <div class="px-6 py-12 text-gray-300 dark:text-gray-600 text-xs italic text-center uppercase tracking-widest">Reading Cloud Database...</div>
            </div>
        </div>

        <div id="adminPanel" class="mt-8 p-6 bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm transition-colors">
            <div id="loginForm" class="text-center">
                <button onclick="adminLogin()" class="w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 px-6 py-3 rounded-xl font-bold hover:bg-gray-50 transition text-xs uppercase tracking-widest">Admin Login</button>
            </div>
            <div id="adminStatus" class="hidden">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/50 flex items-center justify-center text-lg">👑</div>
                        <div><p class="text-xs font-black text-blue-600 dark:text-blue-400 uppercase tracking-tighter">System Admin</p></div>
                    </div>
                    <button onclick="adminLogout()" class="px-4 py-2 bg-gray-100 dark:bg-gray-700 hover:bg-red-50 text-gray-600 hover:text-red-500 transition rounded-lg text-[9px] font-black uppercase tracking-widest border border-gray-200 dark:border-gray-600">Logout</button>
                </div>
                <button onclick="deleteAllFiles()" class="w-full bg-white dark:bg-gray-800 border-2 border-red-200 text-red-500 px-6 py-3 rounded-xl font-bold hover:bg-red-500 hover:text-white transition active:scale-95 text-xs">⚠️ WIPE ENTIRE DATABASE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, getDocs, where, onSnapshot, orderBy, deleteDoc, doc, updateDoc, increment, setDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCib_TOfhgrLyzczdJd2M2owf_nGRqfxRA",
            authDomain: "ourbox-4bc94.firebaseapp.com",
            projectId: "ourbox-4bc94",
            storageBucket: "ourbox-4bc94.firebasestorage.app",
            messagingSenderId: "132533902062",
            appId: "1:132533902062:web:368dddb4a6e7a07ea9b1ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        let isAdmin = false, allFiles = [];
        const CHUNK_SIZE = 450000;
        const STEADY_DELAY = 300;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc, dataChannel, fileObj, receiveBuffer = [], receivedSize = 0, webrtcStartTime = 0;

        window.toggleDarkMode = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
        };
        if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');

        // ADMIN SESSION
        onAuthStateChanged(auth, (u) => {
            isAdmin = (u && u.email === "kalacsgaming@gmail.com");
            document.getElementById('loginForm').classList.toggle('hidden', isAdmin);
            document.getElementById('adminStatus').classList.toggle('hidden', !isAdmin);
            renderFiles();
        });

        window.adminLogin = () => signInWithPopup(auth, provider);
        window.adminLogout = () => { if(confirm("Log out?")) signOut(auth); };

        window.deleteSingleFile = async (headerId) => {
            if (!confirm("Are you sure you want to delete this file?")) return;
            try {
                await deleteDoc(doc(db, "Ourdatabox", headerId));
                const q = query(collection(db, "OurChunks"), where("parentId", "==", headerId));
                const sn = await getDocs(q);
                sn.forEach(async (d) => await deleteDoc(doc(db, "OurChunks", d.id)));
                alert("File removed.");
            } catch (e) { alert(e.message); }
        };

        window.deleteAllFiles = async () => {
            if (!confirm("Wipe entire database?")) return;
            const h = await getDocs(collection(db, "Ourdatabox"));
            const c = await getDocs(collection(db, "OurChunks"));
            for (const d of h.docs) await deleteDoc(doc(db, "Ourdatabox", d.id));
            for (const d of c.docs) await deleteDoc(doc(db, "OurChunks", d.id));
            location.reload();
        };

        // CLOUD LOGIC
        window.autoFillInfo = () => {
            const f = document.getElementById('fileItem').files[0];
            if (f) {
                document.getElementById('customFileName').value = f.name;
                const totalChunks = Math.ceil((f.size * 1.35) / CHUNK_SIZE);
                const estTimeS = Math.round((totalChunks * (800 + STEADY_DELAY)) / 1000);
                document.getElementById('fileInfoBox').classList.remove('hidden');
                document.getElementById('infoChunks').innerText = totalChunks;
                document.getElementById('infoTime').innerText = estTimeS > 60 ? `${Math.floor(estTimeS/60)}m ${estTimeS%60}s` : `${estTimeS}s`;
            }
        };

        window.uploadLargeFile = async function() {
            const file = document.getElementById('fileItem').files[0];
            const name = document.getElementById('customFileName').value.trim();
            const folder = document.getElementById('folderName').value.trim() || "Main Bundle";
            const version = document.getElementById('fileVersion').value.trim() || "1.0";
            if (!file || !name) return alert("Select file.");

            const statusArea = document.getElementById('statusArea');
            const progress = document.getElementById('statusProgress');
            const text = document.getElementById('statusText');
            const etaText = document.getElementById('etaText');
            document.getElementById('uploadBtn').disabled = true;
            statusArea.classList.remove('hidden');

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result;
                const totalChunks = Math.ceil(base64.length / CHUNK_SIZE);
                let currentChunk = 0, startTime = Date.now();
                const heartbeat = setInterval(() => {
                    if (currentChunk >= totalChunks) return;
                    const elapsed = (Date.now() - startTime) / 1000;
                    const remaining = Math.round((elapsed / (currentChunk || 1)) * (totalChunks - currentChunk));
                    etaText.innerText = remaining > 0 ? `ETA: ${remaining}s` : "Wrapping up...";
                }, 1000);

                try {
                    const header = await addDoc(collection(db, "Ourdatabox"), {
                        folder, name, version, totalChunks, isHeader: true, downloads: 0,
                        fileSize: (file.size / (1024 * 1024)).toFixed(2) + " MB", createdAt: new Date()
                    });
                    for (let i = 0; i < totalChunks; i++) {
                        currentChunk = i + 1;
                        await addDoc(collection(db, "OurChunks"), { parentId: header.id, chunkIndex: i, data: base64.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE) });
                        await new Promise(r => setTimeout(r, STEADY_DELAY));
                        progress.style.width = Math.round((currentChunk / totalChunks) * 100) + '%';
                        text.innerText = `UPLOADING: ${Math.round((currentChunk / totalChunks) * 100)}%`;
                    }
                    clearInterval(heartbeat);
                    location.reload();
                } catch (e) { clearInterval(heartbeat); alert(e.message); }
            };
        };

        window.triggerDownload = async (id, name) => {
            const status = document.getElementById('statusArea');
            status.classList.remove('hidden');
            document.getElementById('statusText').innerText = "Streaming from Cloud...";
            const q = query(collection(db, "OurChunks"), where("parentId", "==", id), orderBy("chunkIndex", "asc"));
            const sn = await getDocs(q);
            let parts = [];
            sn.forEach(d => parts.push(d.data().data.includes(",") ? d.data().data.split(",")[1] : d.data().data));
            const blob = new Blob([new Uint8Array(atob(parts.join('')).split("").map(c => c.charCodeAt(0)))]);
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = name; a.click();
            await updateDoc(doc(db, "Ourdatabox", id), { downloads: increment(1) });
            status.classList.add('hidden');
        };

        window.renderFiles = () => {
            const container = document.getElementById('folderContainer'), groups = {};
            allFiles.forEach(f => {
                const fold = f.folder || "Main Bundle";
                if (!groups[fold]) groups[fold] = [];
                groups[fold].push(f);
            });
            container.innerHTML = "";
            Object.keys(groups).sort().forEach(folder => {
                const files = groups[folder], safeId = folder.replace(/\W/g, '');
                container.innerHTML += `
                    <div onclick="document.getElementById('${safeId}').classList.toggle('hidden')" class="cursor-pointer px-6 py-3 bg-gray-50 dark:bg-gray-800 text-[10px] font-black text-gray-500 uppercase flex justify-between border-b dark:border-gray-700">
                        <span>📂 ${folder} (${files.length})</span> <span>▼</span>
                    </div>
                    <ul id="${safeId}" class="divide-y divide-gray-50 dark:divide-gray-700">
                        ${files.map(f => `<li class="px-6 py-4 flex justify-between items-center hover:bg-blue-50/20">
                            <div><p class="text-sm font-bold dark:text-white">${f.name} <span class="text-blue-500 text-[9px]">v${f.version}</span></p>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">${f.fileSize} | 📥 ${f.downloads}</p></div>
                            <div class="flex gap-2">
                                ${isAdmin ? `<button onclick="deleteSingleFile('${f.id}')" class="bg-red-50 dark:bg-red-900/20 text-red-500 p-2 rounded-lg text-[10px] hover:bg-red-500 hover:text-white transition">🗑️</button>` : ''}
                                <button onclick="triggerDownload('${f.id}','${f.name}')" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-[10px] font-bold shadow-sm">GET</button>
                            </div>
                        </li>`).join('')}
                    </ul>`;
            });
        };

        onSnapshot(query(collection(db, "Ourdatabox"), orderBy("createdAt", "desc")), (sn) => {
            allFiles = [];
            sn.forEach(d => { if(d.data().isHeader) allFiles.push({id: d.id, ...d.data()}); });
            renderFiles();
        });

        // WEBRTC P2P
        function updateP2PUI(statusText, showProgress = false, percent = 0, currentBytes = 0) {
            document.getElementById('p2pStatus').innerText = statusText;
            if(showProgress) {
                document.getElementById('streamProgressArea').classList.remove('hidden');
                document.getElementById('streamProgressBar').style.width = percent + '%';
                if (webrtcStartTime > 0 && currentBytes > 0 && percent < 100) {
                    const elapsed = (Date.now() - webrtcStartTime) / 1000;
                    const remainingTime = Math.round((fileObj.size - currentBytes) / (currentBytes / elapsed));
                    document.getElementById('streamETA').innerText = `ETA: ${remainingTime}s (${percent}%)`;
                } else if (percent === 100) document.getElementById('streamETA').innerText = "Done!";
            }
        }

        window.startHosting = async () => {
            fileObj = document.getElementById('p2pFile').files[0];
            if (!fileObj) return;
            const code = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('hostCodeArea').classList.remove('hidden');
            document.getElementById('hostCodeDisplay').innerText = code;
            updateP2PUI("Waiting...");
            pc = new RTCPeerConnection(servers);
            dataChannel = pc.createDataChannel('fileStream');
            setupDataChannelEvents(dataChannel);
            const docRef = doc(db, "P2PSignaling", code);
            pc.onicecandidate = ev => { if(ev.candidate) updateDoc(docRef, { hostCandidates: arrayUnion(ev.candidate.toJSON()) }); };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(docRef, { offer: { type: offer.type, sdp: offer.sdp }, fileName: fileObj.name, fileSize: fileObj.size, fileType: fileObj.type });
            onSnapshot(docRef, sn => {
                const d = sn.data();
                if (!pc.currentRemoteDescription && d?.answer) pc.setRemoteDescription(new RTCSessionDescription(d.answer));
                if (d?.receiverCandidates) d.receiverCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
            });
        };

        window.joinStream = async () => {
            const code = document.getElementById('joinCode').value.trim();
            if (!code) return;
            updateP2PUI("Locating...");
            const docRef = doc(db, "P2PSignaling", code);
            pc = new RTCPeerConnection(servers);
            pc.ondatachannel = ev => setupDataChannelEvents(ev.channel);
            pc.onicecandidate = ev => { if(ev.candidate) updateDoc(docRef, { receiverCandidates: arrayUnion(ev.candidate.toJSON()) }); };
            onSnapshot(docRef, async sn => {
                const h = sn.data();
                if (!pc.currentRemoteDescription && h?.offer) {
                    fileObj = { name: h.fileName, size: h.fileSize, type: h.fileType };
                    await pc.setRemoteDescription(new RTCSessionDescription(h.offer));
                    const ans = await pc.createAnswer(); await pc.setLocalDescription(ans);
                    await updateDoc(docRef, { answer: { type: ans.type, sdp: ans.sdp } });
                }
                if (h?.hostCandidates) h.hostCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
            });
        };

        function setupDataChannelEvents(ch) {
            ch.binaryType = 'arraybuffer';
            ch.onopen = () => { webrtcStartTime = Date.now(); updateP2PUI("Streaming...", true, 0, 0); if (fileObj instanceof File) sendFileData(ch); };
            ch.onmessage = ev => {
                if (ev.data === 'EOF') {
                    const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob(receiveBuffer, { type: fileObj.type }));
                    link.download = fileObj.name; link.click(); receiveBuffer = []; updateP2PUI("Success!", true, 100);
                } else {
                    receiveBuffer.push(ev.data); receivedSize += ev.data.byteLength;
                    updateP2PUI("Syncing...", true, Math.round((receivedSize/fileObj.size)*100), receivedSize);
                    document.getElementById('streamText').innerText = `${(receivedSize/1024/1024).toFixed(1)}MB In`;
                }
            };
        }

        function sendFileData(ch) {
            const sz = 16384; let off = 0; const rd = new FileReader();
            rd.onload = e => {
                ch.send(e.target.result); off += sz;
                updateP2PUI("Broadcasting", true, Math.min(Math.round((off/fileObj.size)*100), 100), off);
                document.getElementById('streamText').innerText = `${(off/1024/1024).toFixed(1)}MB Out`;
                if (off < fileObj.size) { if(ch.bufferedAmount > 1024*1024) setTimeout(() => rd.readAsArrayBuffer(fileObj.slice(off, off+sz)), 50); else rd.readAsArrayBuffer(fileObj.slice(off, off+sz)); } else ch.send('EOF');
            };
            rd.readAsArrayBuffer(fileObj.slice(0, sz));
        }
    </script>
</body>
</html>
