<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.IMGE Pro Tool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 2rem auto; background: #f8fafc; padding: 20px; color: #1e293b; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h3 { margin-top: 0; color: #334155; }
        
        /* Progress Bar Styles */
        .progress-container { width: 100%; background: #e2e8f0; height: 12px; border-radius: 10px; margin: 15px 0; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #3b82f6; transition: width 0.1s; }
        
        .input-group { margin: 20px 0; padding: 15px; background: #f1f5f9; border-radius: 8px; border: 2px dashed #cbd5e1; }
        textarea { width: 100%; height: 100px; font-family: monospace; margin-top: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 11px; }
        canvas { border: 1px solid #334155; margin-top: 20px; max-width: 100%; image-rendering: pixelated; background: #fff; }
        .status-text { font-size: 0.85rem; font-weight: bold; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <h3>1. Image to .IMGE</h3>
    <div class="input-group">
        <input type="file" id="imageInput" accept="image/*">
    </div>
    <div id="encodeProgressCont" class="progress-container">
        <div id="encodeBar" class="progress-bar"></div>
    </div>
    <div id="encodeStatus" class="status-text">Ready to convert...</div>
    <textarea id="outputPreview" readonly placeholder="Output preview..."></textarea>
</div>

<div class="card">
    <h3>2. .IMGE to Image</h3>
    <div class="input-group">
        <input type="file" id="imgeFileInput" accept=".imge">
    </div>
    <div id="decodeProgressCont" class="progress-container">
        <div id="decodeBar" class="progress-bar"></div>
    </div>
    <div id="decodeStatus" class="status-text">Ready to decode...</div>
    <canvas id="mainCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    // --- ENCODER LOGIC ---
    document.getElementById('imageInput').addEventListener('change', function(e) {
        if (!this.files[0]) return;
        const file = this.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const tempCanvas = document.createElement('canvas');
                const tCtx = tempCanvas.getContext('2d');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                tCtx.drawImage(img, 0, 0);
                
                const imageData = tCtx.getImageData(0, 0, img.width, img.height).data;
                let output = `lineLength = ${img.width}\n`;
                
                const progCont = document.getElementById('encodeProgressCont');
                const bar = document.getElementById('encodeBar');
                const status = document.getElementById('encodeStatus');
                
                progCont.style.display = 'block';
                let y = 0;

                // Process rows in chunks to keep the UI responsive
                function processRows() {
                    const chunkEnd = Math.min(y + 20, img.height); // Process 20 rows at a time
                    
                    for (; y < chunkEnd; y++) {
                        let colors = {};
                        for (let x = 0; x < img.width; x++) {
                            let i = (y * img.width + x) * 4;
                            let hex = "#" + ((1 << 24) + (imageData[i] << 16) + (imageData[i+1] << 8) + imageData[i+2]).toString(16).slice(1).toUpperCase();
                            if (!colors[hex]) colors[hex] = [];
                            colors[hex].push(x + 1);
                        }
                        let rowParts = Object.entries(colors).map(([hex, idxs]) => 
                            idxs.length === 1 ? `${idxs[0]} = ${hex}` : `${idxs.join('.')}. = ${hex}`
                        );
                        output += rowParts.join(', ') + ',\n';
                    }

                    // Update progress bar
                    const percent = Math.floor((y / img.height) * 100);
                    bar.style.width = percent + "%";
                    status.innerText = `Converting: ${percent}%`;

                    if (y < img.height) {
                        requestAnimationFrame(processRows);
                    } else {
                        finishEncoding();
                    }
                }

                function finishEncoding() {
                    document.getElementById('outputPreview').value = output;
                    const blob = new Blob([output], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name.split('.')[0] + ".imge";
                    a.click();
                    status.innerText = "✓ Conversion Complete & Downloaded!";
                    setTimeout(() => progCont.style.display = 'none', 2000);
                }

                processRows();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // --- DECODER LOGIC ---
    document.getElementById('imgeFileInput').addEventListener('change', function(e) {
        if (!this.files[0]) return;
        const reader = new FileReader();

        reader.onload = (event) => {
            const text = event.target.result.trim();
            const lines = text.split('\n');
            const lengthMatch = lines[0].match(/lineLength\s*=\s*(\d+)/);
            if (!lengthMatch) return alert("Invalid file format");

            const width = parseInt(lengthMatch[1]);
            const height = lines.length - 1;
            canvas.width = width;
            canvas.height = height;

            const progCont = document.getElementById('decodeProgressCont');
            const bar = document.getElementById('decodeBar');
            const status = document.getElementById('decodeStatus');
            progCont.style.display = 'block';

            let lineIdx = 1;
            function decodeRows() {
                const chunkEnd = Math.min(lineIdx + 50, lines.length);

                for (; lineIdx < chunkEnd; lineIdx++) {
                    const rowStr = lines[lineIdx];
                    if (!rowStr) continue;
                    const y = lineIdx - 1;

                    const segments = rowStr.split(',').filter(s => s.trim().length > 0);
                    segments.forEach(seg => {
                        const [indicesPart, color] = seg.split('=').map(s => s.trim());
                        if (!color) return;
                        const indices = indicesPart.replace(/\.$/, '').split('.');
                        indices.forEach(idx => {
                            ctx.fillStyle = color;
                            ctx.fillRect(parseInt(idx) - 1, y, 1, 1);
                        });
                    });
                }

                const percent = Math.floor((lineIdx / lines.length) * 100);
                bar.style.width = percent + "%";
                status.innerText = `Decoding: ${percent}%`;

                if (lineIdx < lines.length) {
                    requestAnimationFrame(decodeRows);
                } else {
                    status.innerText = "✓ Decoding Complete!";
                    setTimeout(() => progCont.style.display = 'none', 2000);
                }
            }
            decodeRows();
        };
        reader.readAsText(this.files[0]);
    });
</script>

</body>
</html>
